name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag to attach the release to (leave empty for artifacts only)'
        required: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest,   rid: win-x64,     ext: .exe, archive: zip    }
          - { os: windows-11-arm,   rid: win-arm64,   ext: .exe, archive: zip    }
          - { os: ubuntu-latest,    rid: linux-x64,   ext: '',   archive: tar.gz }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, ext: '',   archive: tar.gz }
          - { os: macos-latest,     rid: osx-arm64,   ext: '',   archive: tar.gz }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file binary
        shell: bash
        run: |
          dotnet publish ussf.cs \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:DebugType=none \
            -p:DebugSymbols=false \
            -o publish

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p stage
          cp "publish/ussf${{ matrix.ext }}" "stage/ussfc${{ matrix.ext }}"
          cp README.md stage/ 2>/dev/null || true
          cp LICENSE   stage/ 2>/dev/null || true

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path stage/* -DestinationPath "ussfc-${{ matrix.rid }}.zip"

      - name: Create tar.gz archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          tar -czf "ussfc-${{ matrix.rid }}.tar.gz" -C stage .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ussfc-${{ matrix.rid }}
          path: ussfc-${{ matrix.rid }}.*
          if-no-files-found: error

  pack-tool:
    name: Pack .NET tool (NuGet)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack file-based app as dotnet tool
        shell: bash
        run: |
          dotnet pack ussf.cs -c Release -o nupkg

      - name: Upload nupkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ussfc-nupkg
          path: nupkg/*.nupkg
          if-no-files-found: error

      - name: Push to NuGet.org
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          for pkg in nupkg/*.nupkg; do
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done

  release:
    name: Create GitHub Release
    needs: [publish, pack-tool]
    if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
